name: Test & Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PUBLIC_SUPABASE_URL: "https://fake_test_url.supabase.co"
  PUBLIC_SUPABASE_ANON_KEY: "fake_anon_key"
  PRIVATE_SUPABASE_SERVICE_ROLE: "fake_service_role"
  PRIVATE_STRIPE_API_KEY: "fake_stripe_api_key"
  PUBLIC_SITE_ACCESS: "public"

# Deployment is handled by Cloudflare Pages (connected to this repo via Git).
# This workflow only validates the code — Cloudflare builds and deploys on push.

jobs:
  test:
    name: Lint, Check & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Svelte type check
        run: npm run check

      - name: Run tests
        run: npm run test_run

      - name: Production build
        run: npm run build
