name = "buoy-production-website"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".svelte-kit/cloudflare"

# Chatwoot live-chat widget (src/lib/ChatWidget.svelte). Read at runtime via
# $env/dynamic/public, so they must be bound on the Pages worker — a build-time
# GitHub Actions env var would NOT reach them. Top-level [vars] = production;
# preview deployments deliberately get none, so the widget stays inert there and
# preview traffic never opens conversations in the real inbox.
#
# The website token is a public client-side value by design (Chatwoot
# authenticates the widget by it alone); it ships in the page HTML.
[vars]
PUBLIC_CHATWOOT_BASE_URL = "https://chat.buoy.fish"
PUBLIC_CHATWOOT_TOKEN = "ZWFTJqTGF9zwzA9J28yXL2kY"
